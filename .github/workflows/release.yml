# Openfire AuthProvider - Release
#
# Push a tag (v0.1.0) to build and attach the JAR to a GitHub release.
# NOTE: openfire-oci lib.txt pins the GitLab package-registry build (the
# primary release path) -- this GitHub artifact is a mirror and may not be
# byte-identical to the GitLab JAR (separate mvn runs).

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: setup-java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: package
        run: |
          mvn -B verify
          sha256sum target/openfire-authprovider-*.jar > target/SHA256SUMS

      - name: release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            target/openfire-authprovider-*.jar
            target/SHA256SUMS
